<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="hero">
    <h2>Admin Login</h2>
    <form onsubmit="adminLogin(event)">
      <input type="email" placeholder="Admin Email" id="adminEmail" required><br><br>
      <input type="password" placeholder="Password" id="adminPassword" required><br><br>
      <button type="submit">Login</button>
    </form>
  </section>
</body>
</html>
