<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="hero">
    <h2>User Login</h2>
    <form onsubmit="userLogin(event)">
      <input type="email" placeholder="Email" id="userEmail" required><br><br>
      <input type="password" placeholder="Password" id="userPassword" required><br><br>
      <button type="submit">Login</button>
    </form>
  </section>
</body>
</html>
